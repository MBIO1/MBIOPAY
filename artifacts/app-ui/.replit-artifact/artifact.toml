kind = "web"
previewPath = "/app-ui/"
title = "MBIO App"
version = "1.0.0"
id = "artifacts/app-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app-ui/" ]
localPort = 23033

[services.development]
run = "pnpm --filter @workspace/app-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app-ui", "run", "build" ]
publicDir = "artifacts/app-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23033"
BASE_PATH = "/app-ui/"
