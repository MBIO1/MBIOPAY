packages:
  "framer-motion": "For smooth page transitions and step wizard animations"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation integration"
  "zod": "For form and API schema validation"
  "qrcode.react": "For generating deposit TRC-20 address QR codes"
  "date-fns": "For formatting transaction dates"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conditional tailwind class merging"

images:
  - path: "artifacts/app-ui/public/images/auth-bg.png"
    description: "Abstract dark navy fintech background with subtle glowing emerald green geometric lines and data points"
    aspect_ratio: "16:9"

notes:
  - API uses Bearer JWT auth stored in localStorage as 'mbio_token'
  - The app routes assume /api is the backend base URL
