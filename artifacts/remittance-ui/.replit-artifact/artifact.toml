kind = "web"
previewPath = "/"
title = "Crypto Remittance"
version = "1.0.0"
id = "artifacts/remittance-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21568

[services.development]
run = "pnpm --filter @workspace/remittance-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remittance-ui", "run", "build" ]
publicDir = "artifacts/remittance-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21568"
BASE_PATH = "/"
